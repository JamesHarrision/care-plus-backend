version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: careplus_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: careplus_rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careplus_backend
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
