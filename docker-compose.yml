version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: careplus_redis
    ports:
      - "6379:6379"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: careplus_rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careplus_backend
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    depends_on:
      - redis
      - rabbitmq
    restart: always
    environment:
      - TZ=Asia/Ho_Chi_Minh
